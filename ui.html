<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    :root {
      --bg:       #1E1E1E;
      --bg-alt:   #252526;
      --panel:    #2C2C2C;
      --border:   #3C3C3C;
      --text:     #F3F4F6;
      --text-2:   #A1A1AA;
      --text-3:   #71717A;
      --hover:    #333333;
      --active:   #3A3A3A;
      --font:     "figmaSans","SF Pro Display",system-ui,Helvetica,sans-serif;
      --mono:     "figmaMono","SF Mono",Menlo,monospace;
      --r:        4px;
      --r-btn:    6px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      font-size: 12px;
      font-weight: 400;
      color: var(--text);
      background: var(--bg);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      letter-spacing: -0.14px;
      font-feature-settings: "kern";
    }

    *:focus-visible {
      outline: dashed 2px var(--text-2);
      outline-offset: 2px;
    }

    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
      min-height: 0;
    }

    .panel-left {
      width: 244px;
      background: var(--bg-alt);
      border-right: 1px solid var(--border);
    }

    .panel-mid {
      flex: 1;
      min-width: 0;
      background: var(--bg);
    }

    .panel-right {
      width: 0;
      opacity: 0;
      pointer-events: none;
      background: var(--bg-alt);
      border-left: 1px solid transparent;
      transition: width 0.16s ease, opacity 0.12s ease;
    }

    .workspace.import-open .panel-right {
      width: 280px;
      opacity: 1;
      pointer-events: auto;
      border-left-color: var(--border);
    }

    .workspace.import-open .panel-mid {
      border-right: none;
    }

    .panel-scroll {
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }

    .panel-label {
      height: 30px;
      padding: 0 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.54px;
      border-bottom: 1px solid var(--border);
      background: inherit;
      flex-shrink: 0;
    }

    .panel-label button {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-3);
      background: transparent;
      border: none;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.54px;
    }

    .panel-label button:hover {
      color: var(--text);
    }

    .group {
      border-bottom: 1px solid var(--border);
      padding: 8px 10px;
    }

    .group-title {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 7px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-bottom: 6px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    .lbl {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }

    .ig {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .ig span {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-3);
      letter-spacing: 0.3px;
    }

    input[type="number"],
    input[type="text"],
    select,
    textarea {
      width: 100%;
      padding: 5px 7px;
      border: 1px solid var(--border);
      border-radius: var(--r);
      font-size: 12px;
      font-family: var(--font);
      font-weight: 400;
      color: var(--text);
      background: var(--panel);
      outline: none;
      appearance: none;
      letter-spacing: -0.1px;
      transition: border-color 0.1s;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--text-2);
      outline: dashed 2px var(--text-2);
      outline-offset: 2px;
    }

    textarea {
      resize: none;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 400;
      background: var(--bg);
      line-height: 1.55;
      letter-spacing: 0;
      min-height: 0;
    }

    .hr {
      height: 1px;
      background: var(--border);
      margin: 6px 0;
    }

    .checks {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: -0.1px;
      cursor: pointer;
      user-select: none;
    }

    .check input[type="checkbox"] {
      width: 12px;
      height: 12px;
      accent-color: var(--text-2);
      cursor: pointer;
      flex-shrink: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 6px 12px;
      border-radius: var(--r-btn);
      font-size: 12px;
      font-weight: 450;
      font-family: var(--font);
      letter-spacing: -0.14px;
      cursor: pointer;
      border: none;
      outline: none;
      transition: opacity 0.1s, background 0.1s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn:focus-visible {
      outline: dashed 2px var(--text-2);
      outline-offset: 2px;
    }

    .btn:active {
      opacity: 0.7;
    }

    .btn-solid {
      background: #2C2C2C;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-solid:hover {
      background: #333333;
      opacity: 0.88;
    }

    .btn-ghost {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      background: var(--hover);
    }

    .btn-w {
      width: 100%;
    }

    .btn-row {
      display: flex;
      gap: 5px;
    }

    .btn-row .btn {
      flex: 1;
    }

    .vp-bar {
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 5px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-alt);
      flex-shrink: 0;
    }

    .vp {
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 450;
      font-family: var(--font);
      letter-spacing: -0.1px;
      border-radius: var(--r-btn);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-3);
      cursor: pointer;
      transition: all 0.1s;
    }

    .vp:hover {
      color: var(--text);
      border-color: var(--text-2);
    }

    .vp.on {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .vp:focus-visible {
      outline: dashed 2px var(--text-2);
      outline-offset: 2px;
    }

    .vp-info {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-3);
      letter-spacing: 0.3px;
    }

    .preview-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 0;
    }

    .ps {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 9px 11px;
    }

    .ps-tag {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.54px;
      margin-bottom: 4px;
    }

    .ps-text {
      color: var(--text);
      line-height: 1.25;
      font-feature-settings: "kern";
    }

    .ps-meta {
      margin-top: 4px;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-3);
      letter-spacing: 0.3px;
    }

    .import-wrap {
      flex: 1;
      min-height: 0;
      padding: 8px;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 6px;
      overflow: hidden;
    }

    .import-wrap textarea {
      width: 100%;
      height: 100%;
      min-height: 0;
      overflow: auto;
      white-space: pre-wrap;
      border: 1px solid var(--border);
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      height: 27px;
      min-height: 27px;
      max-height: 27px;
      overflow: hidden;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .dot.on {
      background: var(--text-2);
    }

    .status-bar span {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-3);
      letter-spacing: 0.3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
      flex: 1;
    }

    .actionbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      background: var(--bg-alt);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .actionbar .btn {
      flex: 1;
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-3);
    }
  </style>
</head>
<body>

  <div class="workspace" id="workspace">

    <div class="panel panel-left">
      <div class="panel-label">Configuration</div>
      <div class="panel-scroll">

        <div class="group">
          <div class="group-title">Font Family</div>
          <select id="font">
            <option>Inter</option>
            <option>SF Pro Display</option>
            <option>Roboto</option>
            <option>Pretendard</option>
            <option>Noto Sans</option>
          </select>
        </div>

        <div class="group">
          <div class="group-title">Type Scale</div>

          <div class="field">
            <div class="lbl">Mobile</div>
            <div class="row2">
              <div class="ig">
                <input id="mobileBase" type="number" value="16" />
                <span>Base px</span>
              </div>
              <div class="ig">
                <input id="mobileRatio" type="number" step="0.01" value="1.2" />
                <span>Ratio</span>
              </div>
            </div>
          </div>

          <div class="field">
            <div class="lbl">Tablet</div>
            <div class="row2">
              <div class="ig">
                <input id="tabletBase" type="number" value="17" />
                <span>Base px</span>
              </div>
              <div class="ig">
                <input id="tabletRatio" type="number" step="0.01" value="1.22" />
                <span>Ratio</span>
              </div>
            </div>
          </div>

          <div class="field">
            <div class="lbl">Desktop</div>
            <div class="row2">
              <div class="ig">
                <input id="desktopBase" type="number" value="18" />
                <span>Base px</span>
              </div>
              <div class="ig">
                <input id="desktopRatio" type="number" step="0.01" value="1.25" />
                <span>Ratio</span>
              </div>
            </div>
          </div>
        </div>

        <div class="group">
          <div class="group-title">Weights</div>

          <div class="field">
            <div class="lbl">Heading</div>
            <div class="checks">
              <label class="check"><input type="checkbox" name="hw" value="Regular" checked> Regular</label>
              <label class="check"><input type="checkbox" name="hw" value="Medium" checked> Medium</label>
              <label class="check"><input type="checkbox" name="hw" value="SemiBold" checked> SemiBold</label>
              <label class="check"><input type="checkbox" name="hw" value="Bold"> Bold</label>
            </div>
          </div>

          <div class="hr"></div>

          <div class="field">
            <div class="lbl">Body</div>
            <div class="checks">
              <label class="check"><input type="checkbox" name="bw" value="Regular" checked> Regular</label>
              <label class="check"><input type="checkbox" name="bw" value="Medium" checked> Medium</label>
            </div>
          </div>
        </div>

        <div class="group">
          <div class="group-title">Presets</div>
          <div class="field">
            <select id="presetSel"><option value="">Select preset</option></select>
          </div>
          <div class="field">
            <input id="presetName" type="text" placeholder="Preset name" />
          </div>
          <div class="btn-row">
            <button class="btn btn-solid" id="savePreset">Save</button>
            <button class="btn btn-ghost" id="loadPreset">Load</button>
            <button class="btn btn-ghost" id="delPreset">Delete</button>
          </div>
        </div>

      </div>
    </div>

    <div class="panel panel-mid">
      <div class="panel-label">Live Preview</div>
      <div class="vp-bar">
        <button class="vp on" data-vp="mobile">Mobile</button>
        <button class="vp" data-vp="tablet">Tablet</button>
        <button class="vp" data-vp="desktop">Desktop</button>
        <span class="vp-info" id="vp-info"></span>
      </div>
      <div class="preview-scroll" id="preview-area"></div>
    </div>

    <div class="panel panel-right">
      <div class="panel-label">
        <span>Import JSON</span>
        <button id="close-import" type="button">Close</button>
      </div>
      <div class="import-wrap">
        <textarea id="import-in" placeholder="Paste TypeFlow JSON here…"></textarea>
        <button class="btn btn-solid btn-w" id="importJson">Import</button>
      </div>
    </div>

  </div>

  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="log">Ready</span>
  </div>

  <div class="actionbar">
    <button class="btn btn-ghost" id="preview-btn">Preview</button>
    <button class="btn btn-solid" id="apply">Apply to Figma</button>
    <button class="btn btn-ghost" id="expJson">Export JSON</button>
    <button class="btn btn-ghost" id="expCss">Export CSS</button>
    <button class="btn btn-ghost" id="openImport">Import JSON</button>
  </div>

  <script>
    let presets = {};
    let vp = "mobile";

    const WM = { Regular: 400, Medium: 500, SemiBold: 600, Bold: 700 };
    const TRACK = { H1: "-0.04em", H2: "-0.03em", H3: "-0.02em", H4: "-0.01em", Body: "-0.01em", Label: "0" };
    const STEPS = [
      { tag: "H1",    e: 4,  s: "The quick brown fox" },
      { tag: "H2",    e: 3,  s: "Design systems at scale" },
      { tag: "H3",    e: 2,  s: "Typography token preview" },
      { tag: "H4",    e: 1,  s: "Font weights and ratios" },
      { tag: "Body",  e: 0,  s: "Body text should feel readable and precise at any scale." },
      { tag: "Label", e: -1, s: "Label — small text style" },
    ];

    const $ = id => document.getElementById(id);

    function log(msg, busy = false) {
      const oneLine = String(msg).replace(/\s+/g, " ").trim();
      $("log").textContent = oneLine;
      $("dot").classList.toggle("on", busy);
    }

    function openImportPanel() {
      $("workspace").classList.add("import-open");
    }

    function closeImportPanel() {
      $("workspace").classList.remove("import-open");
    }

    function checked(name) {
      return [...document.querySelectorAll(`input[name="${name}"]:checked`)].map(e => e.value);
    }

    function vals() {
      return {
        mobileBaseFontSize:  +$("mobileBase").value,
        mobileScaleRatio:    +$("mobileRatio").value,
        tabletBaseFontSize:  +$("tabletBase").value,
        tabletScaleRatio:    +$("tabletRatio").value,
        desktopBaseFontSize: +$("desktopBase").value,
        desktopScaleRatio:   +$("desktopRatio").value,
        fontFamily:          $("font").value,
        headingWeights:      checked("hw"),
        bodyWeights:         checked("bw"),
      };
    }

    function applyVals(v) {
      $("font").value         = v.fontFamily          ?? "Inter";
      $("mobileBase").value   = v.mobileBaseFontSize  ?? 16;
      $("mobileRatio").value  = v.mobileScaleRatio    ?? 1.2;
      $("tabletBase").value   = v.tabletBaseFontSize  ?? 17;
      $("tabletRatio").value  = v.tabletScaleRatio    ?? 1.22;
      $("desktopBase").value  = v.desktopBaseFontSize ?? 18;
      $("desktopRatio").value = v.desktopScaleRatio   ?? 1.25;
      document.querySelectorAll(`input[name="hw"]`)
        .forEach(el => el.checked = (v.headingWeights ?? []).includes(el.value));
      document.querySelectorAll(`input[name="bw"]`)
        .forEach(el => el.checked = (v.bodyWeights ?? []).includes(el.value));
      render();
    }

    function render() {
      const v    = vals();
      const base = v[`${vp}BaseFontSize`];
      const r    = v[`${vp}ScaleRatio`];
      $("vp-info").textContent = `${base}px  ×${r}`;

      const hW = v.headingWeights.map(w => WM[w] ?? 400);
      const bW = v.bodyWeights.map(w => WM[w] ?? 400);
      const area = $("preview-area");
      area.innerHTML = "";

      for (const { tag, e, s } of STEPS) {
        const sz = Math.round(base * Math.pow(r, e) * 100) / 100;
        const ws = e > 0 ? hW : bW;
        const w  = ws.length ? Math.max(...ws) : 400;
        const el = document.createElement("div");
        el.className = "ps";
        el.innerHTML =
          `<div class="ps-tag">${tag}</div>` +
          `<div class="ps-text" style="font-size:${sz}px;font-weight:${w};font-family:${v.fontFamily},'figmaSans',system-ui,sans-serif;letter-spacing:${TRACK[tag] ?? "-0.01em"}">${s}</div>` +
          `<div class="ps-meta">${sz}px  /  ${w}</div>`;
        area.appendChild(el);
      }
    }

    function refreshPresets(data = {}, sel = "") {
      presets = data;
      const el = $("presetSel");
      el.innerHTML = `<option value="">Select preset</option>`;
      Object.keys(data).sort().forEach(n => {
        const o = document.createElement("option");
        o.value = o.textContent = n;
        el.appendChild(o);
      });
      if (sel && data[sel]) {
        el.value = sel;
        $("presetName").value = sel;
      }
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const ta = Object.assign(document.createElement("textarea"), {
          value: text,
          style: "position:fixed;opacity:0;pointer-events:none"
        });
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
      }
      log("Copied");
    }

    function post(msg) {
      parent.postMessage({ pluginMessage: msg }, "*");
    }

    document.querySelectorAll(".vp").forEach(b =>
      b.addEventListener("click", () => {
        document.querySelectorAll(".vp").forEach(x => x.classList.remove("on"));
        b.classList.add("on");
        vp = b.dataset.vp;
        render();
      })
    );

    ["mobileBase","mobileRatio","tabletBase","tabletRatio","desktopBase","desktopRatio","font"]
      .forEach(id => $(id).addEventListener("input", render));

    document.querySelectorAll(`input[name="hw"],input[name="bw"]`)
      .forEach(el => el.addEventListener("change", render));

    $("preview-btn").onclick = () => {
      log("Previewing…", true);
      post({ type: "preview", ...vals() });
    };

    $("apply").onclick = () => {
      log("Applying to Figma…", true);
      post({ type: "apply-both", ...vals() });
    };

    $("expJson").onclick = () => {
      log("Exporting JSON…", true);
      post({ type: "copy-json", ...vals() });
    };

    $("expCss").onclick = () => {
      log("Exporting CSS…", true);
      post({ type: "copy-css", ...vals() });
    };

    $("openImport").onclick = () => {
      openImportPanel();
      $("import-in").focus();
    };

    $("close-import").onclick = () => {
      closeImportPanel();
    };

    $("importJson").onclick = () => {
      const t = $("import-in").value.trim();
      if (!t) {
        log("Paste JSON first");
        return;
      }
      log("Importing JSON…", true);
      post({ type: "import-json", importJsonText: t });
    };

    $("savePreset").onclick = () => {
      const n = $("presetName").value.trim();
      if (!n) {
        log("Enter a name");
        return;
      }
      post({ type: "save-preset", presetName: n, presetValues: vals() });
    };

    $("loadPreset").onclick = () => {
      const n = $("presetSel").value;
      if (!n || !presets[n]) {
        log("Select a preset");
        return;
      }
      applyVals(presets[n]);
      $("presetName").value = n;
      log("Loaded preset");
    };

    $("delPreset").onclick = () => {
      const n = $("presetSel").value;
      if (!n) {
        log("Select a preset");
        return;
      }
      post({ type: "delete-preset", presetName: n });
    };

    window.onmessage = async ({ data }) => {
      const msg = data.pluginMessage;
      if (!msg) return;

      if (msg.type === "log") {
        const firstLine = String(msg.message).split("\n")[0];
        log(firstLine, false);
      }

      if (msg.type === "preset-list") {
        refreshPresets(msg.presets || {}, msg.selectedName || "");
        log("Presets updated");
      }

      if (msg.type === "copy-text") {
        await copy(msg.text);
        log("Copied");
      }
    };

    render();
    post({ type: "get-presets" });
  </script>
</body>
</html>
